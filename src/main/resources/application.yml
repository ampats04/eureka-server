server:
  port: 8761

spring:
  application:
    name: eureka-server

  config:
    import: optional:configserver:http://localhost:8888

  cloud:
    config:
      fail-fast: false

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

  environment: ${spring.profiles.active}
  datacenter: default